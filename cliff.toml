[changelog]
header = """
# Changelog\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/gremlinltd/REPO_NAME
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## Unreleased
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first | trim }}\
            {% if commit.scope %} *({{ commit.scope }})*{% endif %}\
            {% if commit.breaking %} **BREAKING**{% endif %} \
([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
            {% if commit.remote.username %} - @{{ commit.remote.username }}{% endif %}\
    {% endfor %}
{% endfor %}

"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat\\(ci\\)", skip = true },
    { message = "^fix\\(ci\\)", skip = true },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^doc", group = "Documentation", skip = true },
    { message = "^style", group = "Style", skip = true },
    { message = "^test", group = "Tests", skip = true },
    { message = "^chore", group = "Chores", skip = true },
    { message = "^ci", group = "CI/CD", skip = true },
    { message = "^build", group = "Build", skip = true },
]
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
sort_commits = "newest"

[remote.github]
owner = "gremlinltd"
repo = "REPO_NAME"
